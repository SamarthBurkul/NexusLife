version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:5000/api
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - redis

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://backend:5000

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
